name: Application CI

on:
  push:
    branches: [main]
    paths:
      - application/**
      - Package.swift
      - .github/workflows/application.yml
  pull_request:
    paths:
      - application/**
      - Package.swift
      - .github/workflows/application.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: application-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Swift application
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build application
        run: swift build
