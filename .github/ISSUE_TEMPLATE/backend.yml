name: Backend issue
description: Report a bug, request, or question about the Python visual service.
title: "[Backend]: "
body:
  - type: dropdown
    id: issue-type
    attributes:
      label: Issue type
      options:
        - Bug
        - Enhancement
        - Question
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Briefly describe the problem or requested change.
    validations:
      required: true

  - type: dropdown
    id: backend-mode
    attributes:
      label: Backend mode
      options:
        - mock
        - diffusers
        - Not applicable
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: For bugs, include the command and the smallest request that reproduces the problem.
      placeholder: |
        1. Start the service with ...
        2. Send ...
        3. Observe ...

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Include the HTTP status and response body when relevant.

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Include the operating system, Python version, and hardware relevant to the issue.
      placeholder: e.g. macOS 15.5, Python 3.13.5, Apple M2 Max
    validations:
      required: true

  - type: input
    id: revision
    attributes:
      label: Backend revision
      description: Provide the release version or Git commit when known.
      placeholder: e.g. v0.1.0 or 0123abcd

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or response
      description: Paste relevant output after removing secrets, image payloads, and private file paths.
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: I searched existing issues for a duplicate.
          required: true
        - label: I removed secrets and private information from this report.
          required: true
